name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy to Vercel (CLI)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ACCESS_TOKEN: ${{ secrets.VERCEL_ACCESS_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          ORG_ID: ${{ secrets.ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
        run: |
          set -euo pipefail
          TOKEN="${VERCEL_TOKEN:-}"
          if [ -z "$TOKEN" ]; then TOKEN="${VERCEL_ACCESS_TOKEN:-}"; fi
          ORG="${VERCEL_ORG_ID:-}"
          if [ -z "$ORG" ]; then ORG="${ORG_ID:-}"; fi
          PROJ="${VERCEL_PROJECT_ID:-}"
          if [ -z "$PROJ" ]; then PROJ="${PROJECT_ID:-}"; fi
          if [ -z "$TOKEN" ]; then
            echo "Missing secret: VERCEL_TOKEN (or VERCEL_ACCESS_TOKEN)" >&2
            exit 1
          fi
          if [ -z "$ORG" ]; then
            echo "Missing secret: VERCEL_ORG_ID (or ORG_ID)" >&2
            exit 1
          fi
          if [ -z "$PROJ" ]; then
            echo "Missing secret: VERCEL_PROJECT_ID (or PROJECT_ID)" >&2
            exit 1
          fi
          export VERCEL_ORG_ID="$ORG"
          export VERCEL_PROJECT_ID="$PROJ"
          # Official CLI path — avoids third-party action breakage on Node / Vercel API changes.
          npx --yes vercel@latest deploy --prod --yes --token "$TOKEN"
