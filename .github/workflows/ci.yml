name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: TypeScript typecheck
        run: npx tsc --noEmit
      - name: ESLint
        run: npx next lint --max-warnings 0

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client (mock schema)
        run: npx prisma generate
        env:
          DATABASE_URL: 'postgresql://fake:fake@localhost:5432/fake'
      - name: Run tests
        run: npm test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: 'postgresql://fake:fake@localhost:5432/fake'
          NEXTAUTH_SECRET: 'ci-test-secret-minimum-32-characters-long'
          NEXTAUTH_URL: 'http://localhost:3000'
          DATA_ENCRYPTION_KEY: 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='
          KSEF_TOKEN_ENCRYPTION_KEY: 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='

  migration-check:
    name: Prisma Migration Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scopeo
          POSTGRES_PASSWORD: scopeo
          POSTGRES_DB: scopeo_ci
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: 'postgresql://scopeo:scopeo@localhost:5433/scopeo_ci'
      - name: Validate schema
        run: npx prisma validate
        env:
          DATABASE_URL: 'postgresql://scopeo:scopeo@localhost:5433/scopeo_ci'
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate
        env:
          # Schema uses env("DATABASE_URL"); validate only parses config (no TCP). Not set globally so integration tests skip DB without a real server.
          DATABASE_URL: postgresql://scopeo:scopeo@127.0.0.1:5432/ci_placeholder

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Audit vulnerabilities
        run: |
          echo "::group::Remediation hints (npm audit fix --dry-run)"
          npm audit fix --dry-run || true
          echo "::endgroup::"
          npm audit --audit-level=high

  # Applies migrations to an ephemeral Postgres so SQL files are valid and `migrate status` matches.
  # Production still requires a separate `prisma migrate deploy` (Vercel build does not run it).
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scopeo
          POSTGRES_PASSWORD: scopeo
          POSTGRES_DB: scopeo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scopeo -d scopeo_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://scopeo:scopeo@localhost:5432/scopeo_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Prisma migrate status
        run: npx prisma migrate status

      - name: API health integration (requires migrated DB)
        run: node --import tsx --test tests/integration/api-health.test.ts
