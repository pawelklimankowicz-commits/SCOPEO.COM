name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy to Vercel (CLI)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ACCESS_TOKEN: ${{ secrets.VERCEL_ACCESS_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          ORG_ID: ${{ secrets.ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
        run: |
          set -euo pipefail
          TOKEN="${VERCEL_TOKEN:-}"
          if [ -z "$TOKEN" ]; then TOKEN="${VERCEL_ACCESS_TOKEN:-}"; fi
          ORG="${VERCEL_ORG_ID:-}"
          if [ -z "$ORG" ]; then ORG="${ORG_ID:-}"; fi
          PROJ="${VERCEL_PROJECT_ID:-}"
          if [ -z "$PROJ" ]; then PROJ="${PROJECT_ID:-}"; fi

          if [ -z "$TOKEN" ] || [ -z "$ORG" ] || [ -z "$PROJ" ]; then
            echo "::warning::Pomijam deploy CLI — brak pelnego zestawu sekretow (VERCEL_TOKEN lub VERCEL_ACCESS_TOKEN, VERCEL_ORG_ID lub ORG_ID, VERCEL_PROJECT_ID lub PROJECT_ID)."
            echo "::notice::Polacz repozytorium z projektem Vercel w panelu Vercel (Git Integration) — wtedy kazdy push na main i tak buduje produkcje bez tego workflow."
            exit 0
          fi

          export VERCEL_ORG_ID="$ORG"
          export VERCEL_PROJECT_ID="$PROJ"
          npx --yes vercel@latest deploy --prod --yes --token "$TOKEN"
